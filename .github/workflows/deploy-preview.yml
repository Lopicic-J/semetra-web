name: Deploy Preview

on:
  pull_request:
    branches: [main, develop]

jobs:
  preview:
    name: Preview Deployment
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deployment.outputs.deployment_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: vercel/actions/deploy-production@main
        if: github.ref == 'refs/heads/main'
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (Preview)
        uses: vercel/actions/deploy@main
        if: github.ref != 'refs/heads/main'
        id: deployment
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment PR with deployment URL
        if: github.event_name == 'pull_request' && steps.deployment.outputs.deployment_url
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Vercel deployment URL: ${{ steps.deployment.outputs.deployment_url }}`
            })
